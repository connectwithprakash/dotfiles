name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck -x \
            bootstrap.sh \
            update_dotfiles.sh \
            install.sh \
            dotfiles \
            scripts/lib.sh \
            scripts/install_system_dependencies.sh \
            scripts/install_pipx_dependencies.sh \
            scripts/macos.sh \
            zsh/install.sh \
            zsh/uninstall.sh \
            zsh/backup_zsh_dotfiles.sh \
            neovim/install.sh \
            vscode/install.sh \
            vscode/fix_vscode_fonts.sh \
            .claude/install.sh

      - name: Syntax check all scripts
        run: |
          status=0
          for f in bootstrap.sh update_dotfiles.sh install.sh dotfiles \
            scripts/*.sh zsh/install.sh zsh/uninstall.sh zsh/backup_zsh_dotfiles.sh \
            neovim/install.sh vscode/install.sh vscode/fix_vscode_fonts.sh \
            .claude/install.sh; do
            if bash -n "$f"; then
              echo "[ok] $f"
            else
              echo "[FAIL] $f"
              status=1
            fi
          done
          exit $status
