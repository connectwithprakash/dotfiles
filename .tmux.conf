# Improve colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Set prefix to Ctrl+a (more ergonomic than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Increase tmux messages display duration
set -g display-time 4000

# Refresh status-line more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Useful when using grouped sessions and multi-monitor
setw -g aggressive-resize on

# Enable mouse support
set -g mouse on

# Don't rename windows automatically
set -g allow-rename off

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Reduce escape time (for vim)
set -sg escape-time 10

# Status bar
set -g status-style 'bg=#333333 fg=#ffffff'
set -g status-left-length 30
set -g status-right-length 50
set -g status-left '#[fg=#88cc88]#S '
set -g status-right '#[fg=#888888]%Y-%m-%d %H:%M'

# Active window
setw -g window-status-current-style 'fg=#88cc88 bold'

# Copy mode with vi keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
