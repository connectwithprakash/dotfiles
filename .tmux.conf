# Improve colors (truecolor / 24-bit)
# tmux-256color is the correct modern terminfo for tmux 3.x; the RGB
# capability tells programs (neovim, etc.) the outer terminal is truecolor.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Set prefix to Ctrl+a (more ergonomic than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Increase tmux messages display duration
set -g display-time 4000

# Refresh status-line more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Useful when using grouped sessions and multi-monitor
setw -g aggressive-resize on

# Enable mouse support
set -g mouse on

# Don't rename windows automatically
set -g allow-rename off

# -----------------------------------------------------------------------------
# i3-like pane/window management
# Prefix is Ctrl-a. Think of tmux panes as i3 containers and tmux windows as
# i3 workspaces. AeroSpace uses Alt globally, so tmux uses Prefix-based keys to
# avoid fighting macOS/AeroSpace shortcuts.
# -----------------------------------------------------------------------------

# Split panes in the current directory. Mnemonics match AeroSpace/i3-ish usage:
# Prefix+v => side-by-side split, Prefix+s => stacked split.
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
# Keep classic visual split keys too.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New tmux "workspace" in current directory.
bind c new-window -c "#{pane_current_path}"

# Vim/i3-style pane focus with Prefix+h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move panes around like i3 move-container: Prefix+Shift+h/j/k/l.
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Also support Alt-arrow without prefix for pane focus. These do not conflict
# with the current AeroSpace config, unlike Alt+h/j/k/l.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes directly with Prefix+Ctrl+h/j/k/l.
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# i3-like resize mode: Prefix+r, then h/j/k/l or arrows, Enter/Esc to leave.
bind r switch-client -T resize-mode
bind -T resize-mode h resize-pane -L 5
bind -T resize-mode j resize-pane -D 5
bind -T resize-mode k resize-pane -U 5
bind -T resize-mode l resize-pane -R 5
bind -T resize-mode Left resize-pane -L 5
bind -T resize-mode Down resize-pane -D 5
bind -T resize-mode Up resize-pane -U 5
bind -T resize-mode Right resize-pane -R 5
bind -T resize-mode H resize-pane -L 10
bind -T resize-mode J resize-pane -D 10
bind -T resize-mode K resize-pane -U 10
bind -T resize-mode L resize-pane -R 10
bind -T resize-mode Enter switch-client -T prefix
bind -T resize-mode Escape switch-client -T prefix

# Layout helpers.
bind Space next-layout
bind b select-layout even-horizontal
bind B select-layout even-vertical
bind f resize-pane -Z

# Easy config reload moved to Prefix+R because Prefix+r enters resize mode.
bind R source-file ~/.tmux.conf \; display "Config reloaded!"

# Reduce escape time (for vim)
set -sg escape-time 10

# Status bar
set -g status-style 'bg=#333333 fg=#ffffff'
set -g status-left-length 30
set -g status-right-length 50
set -g status-left '#[fg=#88cc88]#S '
set -g status-right '#[fg=#888888]%Y-%m-%d %H:%M'

# Active window
setw -g window-status-current-style 'fg=#88cc88 bold'

# Copy mode with vi keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# Plugins (tpm — Tmux Plugin Manager)
#
# First-time setup:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then reload (Prefix+R) and press  Prefix + I  (capital i) to install.
#
# Keep this block at the very bottom: `run tpm` must be the last line.
# -----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # widely-agreed sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save/restore sessions to disk
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto-save + auto-restore

# Continuum: restore the last saved environment when tmux starts, and
# auto-save every 15 minutes. After a reboot your windows/panes come back.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Resurrect: also capture pane contents (scrollback) on save/restore.
set -g @resurrect-capture-pane-contents 'on'

# Initialize tpm — MUST be the last line of the file.
run '~/.tmux/plugins/tpm/tpm'
